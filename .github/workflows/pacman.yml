name: Generate Pacman Animation

on:
  # Roda automaticamente a cada 24 horas
  schedule:
    - cron: "0 0 * * *"
  
  # Permite rodar manualmente a qualquer momento
  workflow_dispatch:
  
  # Roda a cada push na branch principal
  push:
    branches:
    - principal

jobs:
  generate:
    permissions: 
      contents: write
    runs-on: ubuntu-latest
    timeout-minutes: 5
    
    steps:
      # Gera a animação do Pac-Man a partir das suas contribuições
      - name: generate github-contribution-grid-snake.svg
        uses: Platane/snk/svg-only@v3
        with:
          github_user_name: dudamarrtiins
          outputs: |
            dist/github-contribution-grid-snake.svg?palette=github-dark&color_snake=#f7df1e&color_dots=#bfbdbe,#ee6b2f,#e93c4f,#f395ac,#54b2a0
            
      # Envia o arquivo gerado para uma ramificação oculta chamada 'output'
      - name: push github-contribution-grid-snake.svg to the output branch
        uses: crazy-max/ghaction-github-pages@v3.1.0
        with:
          target_branch: output
          build_dir: dist
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
